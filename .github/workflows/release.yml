name: Build and Release Plugins

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:

  release:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Download Dalamud
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
        Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

    - name: Build with dotnet
      run: dotnet build --configuration Release

    - name: Build Automaton (vendored CBT)
      run: dotnet build Automaton/ffxiv_bundledtweaks.sln --configuration Release

    - name: Stage release assets and generate pluginmaster.json
      shell: pwsh
      run: |
        $repoUrl = "https://github.com/${{ github.repository }}"
        New-Item -ItemType Directory -Force -Path staging | Out-Null

        # Project folder name -> built InternalName (output subfolder under bin/x64/Release)
        $plugins = @(
          @{ Project = "SamplePlugin"; InternalName = "CWLSGoTo" },
          @{ Project = "DesynthAllCommand"; InternalName = "DesynthAllCommand" },
          @{ Project = "LogoutOnTell"; InternalName = "LogoutOnTell" },
          @{ Project = "ModGuard"; InternalName = "ModGuard" },
          @{ Project = "TypoGuard"; InternalName = "TypoGuard" },
          @{ Project = "ModSnap"; InternalName = "ModSnap" },
          @{ Project = "Automaton/ffxiv_bundledtweaks"; InternalName = "Automaton" }
        )

        $manifests = @()
        foreach ($plugin in $plugins) {
          $outDir = "$($plugin.Project)/bin/x64/Release/$($plugin.InternalName)"
          $zipName = "$($plugin.InternalName).zip"
          Copy-Item "$outDir/latest.zip" "staging/$zipName"

          $manifest = Get-Content "$outDir/$($plugin.InternalName).json" | ConvertFrom-Json
          $downloadUrl = "$repoUrl/releases/download/latest/$zipName"
          $manifest | Add-Member -NotePropertyName RepoUrl -NotePropertyValue $repoUrl -Force
          $manifest | Add-Member -NotePropertyName DownloadLinkInstall -NotePropertyValue $downloadUrl -Force
          $manifest | Add-Member -NotePropertyName DownloadLinkUpdate -NotePropertyValue $downloadUrl -Force
          $manifest | Add-Member -NotePropertyName DownloadLinkTesting -NotePropertyValue $downloadUrl -Force
          $manifests += $manifest
        }

        ConvertTo-Json @($manifests) -Depth 5 | Set-Content pluginmaster.json

    - name: Create/update release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest build
        body: Automatically published by GitHub Actions from the latest commit on master.
        make_latest: true
        files: staging/*.zip

    - name: Commit pluginmaster.json
      shell: pwsh
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # The freshly generated pluginmaster.json is authoritative - never merge it.
        # On a push race, refetch master, reapply the generated file, and push again
        # (a pull/rebase would hit an unresolvable conflict on the generated file).
        Copy-Item pluginmaster.json "$env:RUNNER_TEMP/pluginmaster.json" -Force
        $pushed = $false
        for ($i = 0; $i -lt 5 -and -not $pushed; $i++) {
          git fetch origin master
          git reset --hard origin/master
          Copy-Item "$env:RUNNER_TEMP/pluginmaster.json" pluginmaster.json -Force
          git add pluginmaster.json
          $status = git status --porcelain
          if (-not $status) {
            Write-Output "pluginmaster.json unchanged, skipping commit"
            $pushed = $true
            break
          }
          git commit -m "Update pluginmaster.json [skip ci]"
          git push origin HEAD:master
          if ($LASTEXITCODE -eq 0) {
            $pushed = $true
          } else {
            Start-Sleep -Seconds 3
          }
        }
        if (-not $pushed) {
          throw "Failed to push pluginmaster.json after retries"
        }
